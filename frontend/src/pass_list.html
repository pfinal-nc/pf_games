<div class="bg-gray-800 flex-1 flex flex-col space-y-5 h-full overflow-y-scroll mt-5">
    <div class="w-full mt-10">
        <div class="flex items-center justify-between">
            <h1 class="text-xl font-bold text-white/50 md:text-2xl">PassWord</h1>
            <div class="mr-5">
                <a href="#" class="flex items-center" id="create_pass">
                        <span class="flex items-center justify-center text-indigo-100 hover:bg-indigo-700 h-12 w-12 rounded-2xl">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                 stroke="currentColor" class="w-6 h-6">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                      d="M12 10.5v6m3-3H9m4.06-7.19l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z"/>

                        </span>

        </div>
        <div class="mt-5 hidden font-mono" id="create_panel">
            <div class="bg-gray-600 shadow-md px-5 pt-5 pb-8 mb-4 flex flex-col my-2 text-white">
                <div class="-mx-3 md:flex mb-6">
                    <div class="md:w-1/2 px-3 mb-6 md:mb-0">
                        <label class="block uppercase tracking-wide text-grey-darker text-xs font-bold mb-2"
                               for="grid-mark">
                            标 识
                        </label>
                        <input class="appearance-none text-black block w-full bg-grey-lighter text-grey-darker border border-red py-1 px-2 mb-1"
                               id="grid-mark" type="text" placeholder="Jane">
                        <p class="text-red-500 text-xs" id="grid-mark-msg"></p>
                    </div>
                    <div class="md:w-1/2 px-3">
                        <label class="block uppercase tracking-wide text-grey-darker text-xs font-bold mb-2"
                               for="grid-username">
                            账 号
                        </label>
                        <input class="appearance-none text-black block w-full bg-grey-lighter text-grey-darker border border-grey-lighter py-1 px-2"
                               id="grid-username" type="text" placeholder="Doe">
                    </div>
                </div>
                <div class="-mx-3 md:flex mb-6">
                    <div class="md:w-full px-3">
                        <label class="block uppercase tracking-wide text-grey-darker text-xs font-bold mb-1"
                               for="grid-password">
                            密 码
                        </label>
                        <input class="appearance-none text-black block w-full bg-grey-lighter text-grey-darker border border-grey-lighter rounded py-1 px-2 mb-1"
                               id="grid-password" type="text" placeholder="******************">
                        <p class="text-red-500 text-xs" id="grid-password-msg"></p>
                    </div>
                </div>
                <div class="-mx-3 md:flex mb-6">
                    <div class="md:w-full px-3">
                        <button onclick="CreatePassword()"
                                class="md:w-1/12 px-1 mb-1 text-xs bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 rounded">
                            添 加
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <section class="container mx-auto font-mono mt-4">
            <div class="w-full mb-8 overflow-y-scroll  shadow-lg">
                <div class="w-full overflow-x-auto">
                    <table class="w-full bg-gray-700">
                        <thead>
                        <tr class="text-md font-semibold tracking-wide text-left text-white bg-gray-700 uppercase border-b border-gray-900">
                            <th class="px-4 py-3">标识</th>
                            <th class="px-4 py-3">用户名</th>
                            <th class="px-4 py-3">密码</th>
                            <th class="px-4 py-3">创建时间</th>
                            <th class="px-4 py-3">操作</th>
                        </tr>
                        </thead>
                        <tbody class="bg-gray-600" id="password_list">
                        <tr class="text-white">
                            <td class="px-4 py-3">
                                <div class="flex items-center text-sm">
                                    <p class="font-semibold text-black">Sufyan</p>
                                </div>
                            </td>
                            <td class="px-4 py-3 text-ms font-semibold">22</td>
                            <td class="px-4 py-3 text-xs">
                                <span class="px-2 py-1 font-semibold leading-tight text-green-700 bg-green-100 rounded-sm"> Acceptable </span>
                            </td>
                            <td class="px-4 py-3 text-sm">6/4/2000</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>
</div>
<script>
    $(function () {
        GetPassList()
        $("#grid-mark").on("focus", function () {
            $("#grid-mark-msg").text("")
        })
        $("#create_pass").on("click", function () {
            $("#create_panel").toggle()
        })
    })
</script>
